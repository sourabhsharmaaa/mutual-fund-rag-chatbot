services:
  - type: web
    name: ppfas-rag-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false        # Set manually in Render dashboard → Environment
      - key: GEMINI_API_KEY
        sync: false        # Set manually in Render dashboard → Environment
      - key: RENDER
        value: true        # Signals the app to use DummyEmbeddingFunc (saves memory)
      - key: FRONTEND_URL
        sync: false        # Set to your Vercel URL, e.g. https://your-app.vercel.app
    disk:
      name: vector-store
      mountPath: /opt/render/project/src/vector_store
      sizeGB: 1          # Free plan allows up to 1 GB persistent disk
