name: Daily RAG Data Update

on:
  schedule:
    # 04:30 UTC is 10:00 AM IST
    - cron: '30 4 * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  update-rag-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
          
      # Ensure data directories exist
      - name: Prepare directories
        run: |
          mkdir -p data logs vector_store

      - name: Run Scheduler Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python scheduler.py --once
          
      - name: Commit and push updated data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/ vector_store/ logs/
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: automated daily RAG data update" && git push)
